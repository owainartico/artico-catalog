<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demand Planner - Artico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">📦</div>
        <h1>Demand Planner</h1>
      </div>
      
      <nav class="nav">
        <button class="nav-item nav-item--active" data-page="dashboard">
          <span class="nav-icon">📊</span>
          <span class="nav-label">Dashboard</span>
        </button>
        <button class="nav-item" data-page="forecast">
          <span class="nav-icon">📈</span>
          <span class="nav-label">Forecast</span>
        </button>
        <button class="nav-item" data-page="reorder">
          <span class="nav-icon">🛒</span>
          <span class="nav-label">Reorder</span>
        </button>
        <button class="nav-item" data-page="items">
          <span class="nav-icon">📋</span>
          <span class="nav-label">Items</span>
        </button>
        <button class="nav-item" data-page="settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">Settings</span>
        </button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div id="page-content" class="page-content"></div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
      <button class="bottom-nav-item bottom-nav-item--active" data-page="dashboard">
        <span class="bottom-nav-icon">📊</span>
        <span class="bottom-nav-label">Dashboard</span>
      </button>
      <button class="bottom-nav-item" data-page="forecast">
        <span class="bottom-nav-icon">📈</span>
        <span class="bottom-nav-label">Forecast</span>
      </button>
      <button class="bottom-nav-item" data-page="reorder">
        <span class="bottom-nav-icon">🛒</span>
        <span class="bottom-nav-label">Reorder</span>
      </button>
      <button class="bottom-nav-item" data-page="items">
        <span class="bottom-nav-icon">📋</span>
        <span class="bottom-nav-label">Items</span>
      </button>
      <button class="bottom-nav-item" data-page="settings">
        <span class="bottom-nav-icon">⚙️</span>
        <span class="bottom-nav-label">Settings</span>
      </button>
    </nav>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <!-- Scripts -->
  <script src="db.js"></script>
  <script src="sync.js"></script>
  <script src="forecast.js"></script>
  <script src="app.js"></script>
</body>
</html>
